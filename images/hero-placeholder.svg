<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c3a2d"/>
      <stop offset="1" stop-color="#5a281f"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <!-- simple skyline of historic rowhouses -->
  <g fill="#4a2018" opacity="0.85">
    <rect x="80" y="430" width="180" height="470"/>
    <rect x="280" y="370" width="200" height="530"/>
    <rect x="500" y="460" width="160" height="440"/>
    <rect x="680" y="340" width="220" height="560"/>
    <rect x="920" y="420" width="180" height="480"/>
    <rect x="1120" y="380" width="200" height="520"/>
    <rect x="1340" y="450" width="180" height="450"/>
  </g>
  <!-- ornamental brass windows -->
  <g fill="#b08642" opacity="0.7">
    <rect x="120" y="470" width="30" height="46"/><rect x="180" y="470" width="30" height="46"/>
    <rect x="320" y="410" width="32" height="50"/><rect x="390" y="410" width="32" height="50"/>
    <rect x="730" y="390" width="34" height="54"/><rect x="810" y="390" width="34" height="54"/>
    <rect x="1160" y="430" width="32" height="50"/><rect x="1240" y="430" width="32" height="50"/>
  </g>
</svg>
